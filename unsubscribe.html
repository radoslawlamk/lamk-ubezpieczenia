<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Preferencje marketingowe | LAMKUBEZPIECZENIA.pl</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:#17212b;background:#f3f5f7;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}.panel{width:min(560px,100%);padding:28px;border:1px solid #dbe1e7;border-radius:8px;background:#fff;box-shadow:0 18px 50px rgba(13,36,56,.08)}.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;color:#0d2438;font-weight:900}.mark{display:grid;place-items:center;width:38px;height:38px;border-radius:6px;color:#fff;background:#087d75}h1{margin:0 0 10px;color:#0d2438;font-size:1.65rem;letter-spacing:0}p{margin:0 0 18px;color:#697586;line-height:1.6}.preferences{display:grid;gap:8px;margin:20px 0}.preference{display:grid;grid-template-columns:20px 1fr;gap:10px;align-items:start;padding:12px;border:1px solid #dbe1e7;border-radius:6px}.preference input{width:17px;height:17px;margin:2px 0 0}.preference strong{display:block;color:#0d2438;font-size:13px}.preference span{display:block;margin-top:2px;color:#697586;font-size:11px}.actions{display:grid;gap:8px}button{width:100%;min-height:44px;border:1px solid transparent;border-radius:6px;color:#fff;background:#0d2438;font:inherit;font-weight:850;cursor:pointer}button.secondary{color:#a62b2b;background:#fff;border-color:#e2b8b8}button:disabled{opacity:.6;cursor:wait}.status{min-height:22px;margin-top:14px;color:#17734a;font-size:13px}.error{color:#a62b2b}.fine{font-size:11px}
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand"><span class="mark">L</span>LAMKUBEZPIECZENIA.pl</div>
    <h1>Preferencje marketingowe</h1>
    <p id="description">Sprawdzamy link rezygnacji...</p>
    <div class="preferences" id="preferences" hidden>
      <label class="preference"><input id="emailConsent" type="checkbox" /><span><strong>Marketing e-mail</strong><span>Oferty, informacje i porady przesyłane pocztą elektroniczną.</span></span></label>
      <label class="preference"><input id="smsConsent" type="checkbox" /><span><strong>Marketing SMS/MMS</strong><span>Oferty i przypomnienia przesyłane na numer telefonu.</span></span></label>
      <label class="preference"><input id="phoneConsent" type="checkbox" /><span><strong>Kontakt telefoniczny</strong><span>Rozmowy telefoniczne dotyczące ofert ubezpieczeniowych.</span></span></label>
    </div>
    <div class="actions" id="actions" hidden>
      <button id="saveButton" type="button">Zapisz zmiany</button>
      <button class="secondary" id="removeAllButton" type="button">Usuń mnie z bazy marketingowej</button>
    </div>
    <p class="fine">Na tej stronie można wyłącznie ograniczyć lub wycofać zgody. Ich ponowne udzielenie wymaga świadomego zaznaczenia odpowiednich zgód w formularzu.</p>
    <p class="status" id="status" role="status"></p>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const description = document.querySelector('#description');
    const preferences = document.querySelector('#preferences');
    const actions = document.querySelector('#actions');
    const saveButton = document.querySelector('#saveButton');
    const removeAllButton = document.querySelector('#removeAllButton');
    const status = document.querySelector('#status');
    const fields = { marketing_email_consent:document.querySelector('#emailConsent'), marketing_sms_consent:document.querySelector('#smsConsent'), marketing_phone_consent:document.querySelector('#phoneConsent') };
    fetch(`/api/marketing/unsubscribe-info?token=${encodeURIComponent(token)}`)
      .then(async response => { const data = await response.json(); if (!response.ok) throw new Error(data.error); return data; })
      .then(data => { description.textContent = `Zarządzaj zgodami powiązanymi z adresem ${data.email}.`; Object.entries(fields).forEach(([key,field]) => { field.checked = Boolean(data[key]); field.disabled = !data[key]; }); preferences.hidden = false; actions.hidden = false; })
      .catch(error => { description.textContent = error.message; status.classList.add('error'); });
    async function updatePreferences(payload) {
      saveButton.disabled = true; removeAllButton.disabled = true;
      status.classList.remove('error'); status.textContent = 'Zapisywanie preferencji...';
      try {
        const response = await fetch('/api/marketing/preferences', { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token,...payload}) });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error);
        Object.entries(fields).forEach(([key,field]) => { field.checked = Boolean(data.preferences[key]); field.disabled = !data.preferences[key]; });
        status.textContent = payload.remove_all ? 'Wszystkie zgody marketingowe zostały wycofane.' : 'Preferencje zostały zapisane.';
      } catch (error) {
        status.textContent = error.message; status.classList.add('error');
      } finally { saveButton.disabled = false; removeAllButton.disabled = false; }
    }
    saveButton.addEventListener('click', () => updatePreferences(Object.fromEntries(Object.entries(fields).map(([key,field]) => [key, field.checked]))));
    removeAllButton.addEventListener('click', () => { if (confirm('Wycofać wszystkie zgody i usunąć kontakt z bazy marketingowej?')) updatePreferences({remove_all:true}); });
  </script>
</body>
</html>
